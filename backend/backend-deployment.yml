apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 747917427963.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:0f44f3f0ab1d3716765a5643e5f4223dbeac248b
          ports:
            - containerPort: 5000
