apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:083a0ff5216e3db0d9034f4f25674b0d9adc425e
        ports:
        - containerPort: 80
