apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:083a0ff5216e3db0d9034f4f25674b0d9adc425e
        ports:
        - containerPort: 80
