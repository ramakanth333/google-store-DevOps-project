apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 747917427963.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:0f44f3f0ab1d3716765a5643e5f4223dbeac248b
        ports:
        - containerPort: 80
