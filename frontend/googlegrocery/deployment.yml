apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 747917427963.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:33ff6216b15c747167cd30465a8c82816ea16322
        ports:
        - containerPort: 80
