apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 747917427963.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:33ff6216b15c747167cd30465a8c82816ea16322
        ports:
        - containerPort: 80
