apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 747917427963.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:0f44f3f0ab1d3716765a5643e5f4223dbeac248b
        ports:
        - containerPort: 80
