apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 747917427963.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:33ff6216b15c747167cd30465a8c82816ea16322
        ports:
        - containerPort: 80
