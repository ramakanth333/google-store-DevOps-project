apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 747917427963.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:0f44f3f0ab1d3716765a5643e5f4223dbeac248b
        ports:
        - containerPort: 80
