apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 747917427963.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:0f44f3f0ab1d3716765a5643e5f4223dbeac248b
        ports:
        - containerPort: 80

