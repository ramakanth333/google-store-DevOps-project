apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 747917427963.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:33ff6216b15c747167cd30465a8c82816ea16322
        ports:
        - containerPort: 80

