apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 905418310012.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:083a0ff5216e3db0d9034f4f25674b0d9adc425e
        ports:
        - containerPort: 80

